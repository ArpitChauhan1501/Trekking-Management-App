{% extends "base.html" %} {% block content %}

<div class="container py-5">
  <h2 class="fw-bold">Welcome, {{ current_user.name }}</h2>
  
  <p class="text-muted mb-1">Staff Dashboard</p>

  <p class="text-muted mb-4">Manage your assigned treks and bookings.</p>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card dashboard-card shadow-sm h-100">
        <div class="card-body text-center">
          <i class="bi bi-map fs-1 text-success"></i>

          <h5 class="mt-3">Assigned Treks</h5>

          <p class="text-muted">View and manage your assigned treks.</p>

          <a href="{{ url_for('staff.assigned_treks') }}" class="btn btn-success"> Open </a>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card dashboard-card shadow-sm h-100">
        <div class="card-body text-center">
          <i class="bi bi-calendar-check fs-1 text-success"></i>

          <h5 class="mt-3">Bookings</h5>

          <p class="text-muted">Manage trek bookings.</p>

          <a href="{{ url_for('staff.staff_bookings') }}" class="btn btn-success"> Open </a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
