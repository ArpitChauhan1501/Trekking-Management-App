{% extends "base.html" %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">
                        <i class="bi bi-pencil-square me-2"></i>
                        Edit Trek
                    </h3>
                </div>

                <div class="card-body">

                    <form method="POST"
                          action="{{ url_for('admin.edit_trek', trek_id=trek.id) }}"
                          enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">
                                Trek Name <span class="text-danger">*</span>
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   value="{{ trek.name }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Location <span class="text-danger">*</span>
                            </label>

                            <input type="text"
                                   name="location"
                                   class="form-control"
                                   value="{{ trek.location }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Difficulty <span class="text-danger">*</span>
                            </label>

                            <select name="difficulty"
                                    class="form-select"
                                    required>

                                <option value="Easy"
                                    {% if trek.difficulty == "Easy" %}selected{% endif %}>
                                    Easy
                                </option>

                                <option value="Moderate"
                                    {% if trek.difficulty == "Moderate" %}selected{% endif %}>
                                    Moderate
                                </option>

                                <option value="Hard"
                                    {% if trek.difficulty == "Hard" %}selected{% endif %}>
                                    Hard
                                </option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Duration (Days) <span class="text-danger">*</span>
                            </label>

                            <input type="number"
                                   name="duration"
                                   class="form-control"
                                   min="1"
                                   value="{{ trek.duration }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Price (₹) <span class="text-danger">*</span>
                            </label>

                            <input type="number"
                                   name="price"
                                   class="form-control"
                                   min="0"
                                   step="0.01"
                                   value="{{ trek.price }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Maximum Participants <span class="text-danger">*</span>
                            </label>

                            <input type="number"
                                   name="max_participants"
                                   class="form-control"
                                   min="1"
                                   value="{{ trek.max_participants }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Description <span class="text-danger">*</span>
                            </label>

                            <textarea name="description"
                                      class="form-control"
                                      rows="5"
                                      required>{{ trek.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Assign Staff
                            </label>

                            <select name="staff_id" class="form-select">

                                <option value="">
                                    Select Staff
                                </option>

                                {% for member in staff %}

                                <option value="{{ member.id }}"
                                    {% if trek.staff_id == member.id %}selected{% endif %}>

                                    {{ member.name }}

                                </option>

                                {% endfor %}

                            </select>

                            <div class="form-text">
                                Leave this blank if no staff member is assigned.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Trek Image
                            </label>

                            {% if trek.image %}
                            <div class="mb-2">
                                <img src="{{ url_for('static', filename='uploads/' + trek.image) }}"
                                     alt="Current Trek Image"
                                     class="img-thumbnail"
                                     style="max-width:220px;">
                            </div>
                            {% endif %}

                            <input type="file"
                                   name="image"
                                   class="form-control"
                                   accept="image/*">

                            <div class="form-text">
                                Leave empty to keep the existing image.
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('admin.admin_treks') }}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>

                            <button type="submit"
                                    class="btn btn-success">
                                Update Trek
                            </button>

                        </div>

                    </form>

                    <p class="text-muted small mt-3 mb-0">
                        <span class="text-danger">*</span> indicates required fields.
                    </p>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
