{% extends "base.html" %} {% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h3 class="mb-0">
            <i class="bi bi-plus-circle me-2"></i>

            Add New Trek
          </h3>
        </div>
        <div class="card-body">
          <form
            method="POST"
            action="{{ url_for('admin.add_trek') }}"
            enctype="multipart/form-data"
          >
            <div class="mb-3">
              <label class="form-label">
                Trek Name <span class="text-danger">*</span>
              </label>
              <input type="text" name="name" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label">
                Location <span class="text-danger">*</span>
              </label>
              <input
                type="text"
                name="location"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">
                Difficulty <span class="text-danger">*</span>
              </label>
              <select name="difficulty" class="form-select" required>
                <option value="">Select Difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Moderate">Moderate</option>
                <option value="Hard">Hard</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">
                Duration <span class="text-danger">*</span>
              </label>

              <input
                type="number"
                name="duration"
                class="form-control"
                min="1"
                placeholder="Number of days"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">
                Price <span class="text-danger">*</span>
              </label>

              <input
                type="number"
                name="price"
                class="form-control"
                min="0"
                step="0.01"
                placeholder="Price in ₹"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">
                Maximum Participants <span class="text-danger">*</span>
              </label>

              <input
                type="number"
                name="max_participants"
                class="form-control"
                min="1"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">
                Description <span class="text-danger">*</span>
              </label>

              <textarea
                name="description"
                class="form-control"
                rows="5"
                placeholder="Enter trek description..."
                required
              ></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label"> Assign Staff </label>

              <select name="staff_id" class="form-select">
                <option value="">Select Staff</option>

                {% for member in staff %}

                <option value="{{ member.id }}">{{ member.name }}</option>

                {% endfor %}
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label"> Trek Image </label>

              <input
                type="file"
                name="image"
                class="form-control"
                accept="image/*"
              />
              <div class="form-text">Upload JPG, JPEG or PNG image.</div>
            </div>
            <div class="d-flex justify-content-between">
              <a
                href="{{ url_for('admin.admin_treks') }}"
                class="btn btn-outline-secondary"
              >
                Cancel
              </a>

              <button type="submit" class="btn btn-success">Add Trek</button>
            </div>
          </form>
          <p class="text-muted small mt-3 mb-0">
            <span class="text-danger">*</span> indicates required fields.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
