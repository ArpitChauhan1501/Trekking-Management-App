{% extends "base.html" %} {% block content %}

<div class="container py-5">
  <h2 class="fw-bold">Welcome, {{ current_user.name }}</h2>

  <p class="text-muted mb-1">Administrator Dashboard</p>

  <p class="text-muted mb-4">Manage your trekking platform from here.</p>

  <div class="row g-4">
    <div class="col-md-6 col-lg-3">
      <div class="card dashboard-card shadow-sm h-100">
        <div class="card-body text-center">
          <i class="bi bi-map fs-1 text-success"></i>

          <h5 class="mt-3">Treks</h5>

          <p class="text-muted">Manage trekking routes</p>

          <a href="{{ url_for('admin.admin_treks') }}" class="btn btn-success"> Manage </a>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3">
      <div class="card dashboard-card shadow-sm h-100">
        <div class="card-body text-center">
          <i class="bi bi-people fs-1 text-success"></i>

          <h5 class="mt-3">Staff</h5>

          <p class="text-muted">Manage staff members</p>

          <a href="{{ url_for('admin.admin_staff') }}" class="btn btn-success"> Manage </a>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3">
      <div class="card dashboard-card shadow-sm h-100">
        <div class="card-body text-center">
          <i class="bi bi-person-lines-fill fs-1 text-success"></i>

          <h5 class="mt-3">Users</h5>

          <p class="text-muted">View all users</p>

          <a href="{{ url_for('admin.admin_users') }}" class="btn btn-success"> View </a>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3">
      <div class="card dashboard-card shadow-sm h-100">
        <div class="card-body text-center">
          <i class="bi bi-calendar-check fs-1 text-success"></i>

          <h5 class="mt-3">Bookings</h5>

          <p class="text-muted">View bookings</p>

          <a href="{{ url_for('admin.admin_bookings') }}" class="btn btn-success"> View </a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
